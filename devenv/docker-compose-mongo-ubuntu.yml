# Docker Compose for generic Ubuntu Linux container
#
# Usage:
#   docker compose -f docker-compose-mongo-ubuntu.yml up -d --build
#   docker exec -it mongo-ubuntu bash

include:
  - docker-compose-mongo-net.yml

services:
  mongo-ubuntu:
    container_name: mongo-ubuntu
    hostname: mongo-ubuntu
    build:
      context: .
      dockerfile_inline: |
        FROM ubuntu:24.04

        ENV DEBIAN_FRONTEND=noninteractive
        ENV TZ=UTC

        RUN apt-get update && apt-get upgrade -y

        RUN apt-get update && apt-get install -y \
            ca-certificates \
            curl \
            gnupg \
            htop \
            less \
            lsb-release \
            net-tools \
            software-properties-common \
            sudo \
            telnet \
            tmux \
            vim \
            wget \
            && rm -rf /var/lib/apt/lists/*

        RUN echo "ubuntu:ubuntu" | chpasswd && \
            usermod -aG sudo ubuntu && \
            echo "ubuntu ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

        WORKDIR /home/ubuntu
        USER ubuntu

        ENV SHELL=/usr/bin/bash
        ENV USER=ubuntu
        ENV HOME=/home/ubuntu

        CMD ["sleep", "infinity"]
    stdin_open: true
    tty: true
    networks:
      mongo-net:
        aliases:
          - mongo-ubuntu
      mongo-external:
