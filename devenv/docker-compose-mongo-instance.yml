# Docker Compose for a MongoDB instance container
#
# Usage:
#   docker compose -f docker-compose-mongo-instance.yml up -d --build
#   docker exec -it mongo-instance bash
#
# To connect:
#   mongosh mongodb://mongo-instance:27017
#   mongosh mongodb://localhost:27017

include:
  - docker-compose-mongo-net.yml

services:
  mongo-instance:
    container_name: mongo-instance
    hostname: mongo-instance
    build:
      context: .
      dockerfile_inline: |
        FROM ubuntu:24.04

        ENV DEBIAN_FRONTEND=noninteractive
        ENV TZ=UTC

        RUN apt-get update && apt-get upgrade -y

        RUN apt-get update && apt-get install -y \
            ca-certificates \
            curl \
            gnupg \
            htop \
            less \
            lsb-release \
            net-tools \
            software-properties-common \
            sudo \
            telnet \
            tmux \
            vim \
            wget \
            && rm -rf /var/lib/apt/lists/*

        RUN echo "ubuntu:ubuntu" | chpasswd && \
            usermod -aG sudo ubuntu && \
            echo "ubuntu ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

        # Import MongoDB GPG key
        RUN curl -fsSL https://www.mongodb.org/static/pgp/server-8.0.asc | \
            gpg -o /usr/share/keyrings/mongodb-server-8.0.gpg --dearmor

        # Add MongoDB repository
        RUN echo "deb [ arch=arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/8.0 multiverse" | \
            tee /etc/apt/sources.list.d/mongodb-org-8.0.list

        RUN apt-get update && apt-get install -y \
            mongodb-org=8.0.* \
            mongodb-org-database=8.0.* \
            mongodb-org-server=8.0.* \
            mongodb-org-mongos=8.0.* \
            mongodb-org-tools=8.0.* \
            mongodb-mongosh \
            && rm -rf /var/lib/apt/lists/*

        RUN mkdir -p /mongo-data/db /mongo-data/logs && \
            chown -R mongodb:mongodb /mongo-data

        EXPOSE 27017

        USER mongodb

        CMD ["mongod", "--bind_ip", "0.0.0.0", "--port", "27017", "--dbpath", "/mongo-data/db", "--logpath", "/mongo-data/logs/mongod.log", "--replSet", "rs0"]
    ports:
      - "27017:27017"
    mem_limit: 4g
    memswap_limit: 4g
    volumes:
      - mongo-instance-data:/mongo-data
    networks:
      mongo-net:
        aliases:
          - mongo-instance
      mongo-external:

volumes:
  mongo-instance-data:
    driver: local
